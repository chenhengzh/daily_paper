{% extends "base.html" %}
{% block title %}管理员 - Daily Paper{% endblock %}

{% block content %}
<div class="config-page">
  <div class="config-header">
    <h2>管理员</h2>
  </div>

  <div id="adminMsg" class="alert" style="display:none"></div>

  <div class="admin-tabs">
    <button class="admin-tab active" id="tabUsers" onclick="switchTab('users')">用户管理</button>
    <button class="admin-tab" id="tabCodes" onclick="switchTab('codes')">邀请码</button>
  </div>

  <!-- 用户管理 -->
  <div id="panelUsers" class="admin-panel">
    <div id="usersLoading" style="color:var(--text3);font-size:13px;padding:12px 0">加载中...</div>
    <table class="admin-table" id="usersTable" style="display:none">
      <thead>
        <tr>
          <th>用户名</th>
          <th>注册时间</th>
          <th>最后登录</th>
          <th>用户类型</th>
          <th>管理员</th>
          <th>已激活</th>
        </tr>
      </thead>
      <tbody id="usersBody"></tbody>
    </table>
  </div>

  <!-- 邀请码 -->
  <div id="panelCodes" class="admin-panel" style="display:none">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <input type="number" id="codeCount" value="1" min="1" max="50"
        style="width:70px" title="生成数量">
      <select id="codeType" style="font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)">
        <option value="external">外部（需自备 API Key）</option>
        <option value="internal">内部（可用内部 API）</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="generateCodes()">生成邀请码</button>
    </div>
    <div id="codesLoading" style="color:var(--text3);font-size:13px;padding:12px 0">加载中...</div>
    <table class="admin-table" id="codesTable" style="display:none">
      <thead>
        <tr>
          <th>邀请码</th>
          <th>类型</th>
          <th>创建时间</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="codesBody"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentTab = 'users';
const IS_SUPERADMIN = {{ 'true' if user.username == 'admin' else 'false' }};

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabUsers').classList.toggle('active', tab === 'users');
  document.getElementById('tabCodes').classList.toggle('active', tab === 'codes');
  document.getElementById('panelUsers').style.display = tab === 'users' ? '' : 'none';
  document.getElementById('panelCodes').style.display = tab === 'codes' ? '' : 'none';
}

function showMsg(msg, type) {
  const el = document.getElementById('adminMsg');
  el.textContent = msg;
  el.className = 'alert alert-' + type;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '-';
  return iso.slice(0, 16).replace('T', ' ');
}

// ── 用户管理 ─────────────────────────────────────────────────────────────────

async function loadUsers() {
  try {
    const res = await fetch('/admin/users');
    const users = await res.json();
    document.getElementById('usersLoading').style.display = 'none';
    const table = document.getElementById('usersTable');
    table.style.display = '';
    const tbody = document.getElementById('usersBody');
    tbody.innerHTML = users.map(u => `
      <tr id="user-row-${u.id}">
        <td><strong>${esc(u.username)}</strong></td>
        <td>${fmtDate(u.created_at)}</td>
        <td>${fmtDate(u.last_login)}</td>
        <td><button class="btn-link" style="font-size:12px;${u.user_type==='internal'?'color:var(--accent)':''}"
          onclick="toggleUserType(${u.id}, '${u.user_type}', this)">${u.user_type==='internal'?'内部':'外部'}</button></td>
        <td>
          <label class="toggle-label">
            <input type="checkbox" ${u.is_admin ? 'checked' : ''} ${!IS_SUPERADMIN ? 'disabled' : ''}
              onchange="updateUser(${u.id}, 'is_admin', this.checked, this)">
            <span class="toggle-track"></span>
          </label>
        </td>
        <td>
          <label class="toggle-label">
            <input type="checkbox" ${u.is_active ? 'checked' : ''}
              onchange="updateUser(${u.id}, 'is_active', this.checked, this)">
            <span class="toggle-track"></span>
          </label>
        </td>
      </tr>`).join('');
  } catch(e) {
    document.getElementById('usersLoading').textContent = '加载失败: ' + e.message;
  }
}

async function updateUser(userId, field, value, checkbox) {
  try {
    const res = await fetch(`/admin/users/${userId}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({[field]: value}),
    });
    if (!res.ok) {
      const d = await res.json();
      showMsg(d.detail || '操作失败', 'error');
      checkbox.checked = !value;
    } else {
      showMsg('已更新', 'success');
    }
  } catch(e) {
    showMsg('请求失败: ' + e.message, 'error');
    checkbox.checked = !value;
  }
}

// ── 邀请码 ───────────────────────────────────────────────────────────────────

async function loadCodes() {
  try {
    const res = await fetch('/admin/invite-codes');
    const codes = await res.json();
    document.getElementById('codesLoading').style.display = 'none';
    const table = document.getElementById('codesTable');
    table.style.display = '';
    renderCodes(codes);
  } catch(e) {
    document.getElementById('codesLoading').textContent = '加载失败: ' + e.message;
  }
}

function renderCodes(codes) {
  const tbody = document.getElementById('codesBody');
  if (codes.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text3);text-align:center">暂无邀请码</td></tr>';
    return;
  }
  tbody.innerHTML = codes.map(c => `
    <tr>
      <td>
        <code class="invite-code">${esc(c.code)}</code>
        <button class="btn-icon" onclick="copyCode('${esc(c.code)}')" title="复制">⎘</button>
      </td>
      <td><span class="badge badge-${c.code_type==='internal'?'info':''}">${c.code_type==='internal'?'内部':'外部'}</span></td>
      <td>${fmtDate(c.created_at)}</td>
      <td>
        <button class="btn btn-sm" style="color:var(--red);border-color:var(--red)"
          onclick="deleteCode('${esc(c.code)}')">删除</button>
      </td>
    </tr>`).join('');
}

async function toggleUserType(userId, currentType, btn) {
  const newType = currentType === 'internal' ? 'external' : 'internal';
  try {
    const res = await fetch(`/admin/users/${userId}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_type: newType}),
    });
    if (res.ok) {
      btn.textContent = newType === 'internal' ? '内部' : '外部';
      btn.style.color = newType === 'internal' ? 'var(--accent)' : '';
      btn.onclick = () => toggleUserType(userId, newType, btn);
      showMsg('已更新', 'success');
    } else {
      const d = await res.json();
      showMsg(d.detail || '更新失败', 'error');
    }
  } catch(e) { showMsg('请求失败: ' + e.message, 'error'); }
}

async function generateCodes() {
  const count = parseInt(document.getElementById('codeCount').value) || 1;
  const code_type = document.getElementById('codeType').value;
  try {
    const res = await fetch('/admin/invite-codes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({count, code_type}),
    });
    const d = await res.json();
    showMsg(`已生成 ${d.codes.length} 个邀请码`, 'success');
    await loadCodes();
  } catch(e) {
    showMsg('生成失败: ' + e.message, 'error');
  }
}

async function deleteCode(code) {
  if (!confirm(`确认删除邀请码 ${code}？`)) return;
  try {
    const res = await fetch(`/admin/invite-codes/${encodeURIComponent(code)}`, {method: 'DELETE'});
    if (res.ok) {
      showMsg('已删除', 'success');
      await loadCodes();
    } else {
      const d = await res.json();
      showMsg(d.detail || '删除失败', 'error');
    }
  } catch(e) {
    showMsg('请求失败: ' + e.message, 'error');
  }
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => showMsg('已复制', 'success'));
}

// 初始化
loadUsers();
loadCodes();
</script>
{% endblock %}
