{% extends "base.html" %}
{% block title %}Daily Paper{% endblock %}

{% block content %}
<div class="page-layout" id="pageLayout">

  <!-- 左侧面板 -->
  <aside class="filter-panel" id="leftPanel">
    <div class="filter-panel-inner" id="leftPanelInner">

      <div class="filter-section" id="dateSection">
        <h3>日期</h3>
        <select id="dateSelect" onchange="changeDate(this.value)">
          <option value="all">全部日期</option>
          {% for d in dates %}
          <option value="{{ d }}" {% if d == target_date %}selected{% endif %}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="filter-section">
        <h3>搜索</h3>
        <input type="text" id="searchInput" placeholder="标题、摘要、TLDR..." oninput="applyFilters()" style="width:100%">
      </div>

      <div class="filter-section">
        <h3>显示</h3>
        <div class="view-toggle">
          <button id="btnSelected" class="active" onclick="setView('selected')">精选</button>
          <button id="btnAll" onclick="setView('all')">全部</button>
        </div>
      </div>

      <div class="filter-section">
        <h3>研究方向</h3>
        <div id="fieldFilters" class="field-filters"></div>
      </div>

      <div class="filter-section stats-section">
        <div id="statsDisplay"></div>
      </div>

      <div class="filter-section" id="triggerSection">
        <div style="display:flex;gap:6px;align-items:center">
          <div id="jobStatus" class="job-status" style="flex:1"></div>
          <button class="btn btn-secondary btn-sm" id="triggerBtn" onclick="triggerJob()">触发</button>
        </div>
        <div id="triggerProgress" style="display:none;margin-top:8px">
          <div id="triggerProgressLabel" style="font-size:11px;color:var(--text3);margin-bottom:3px"></div>
          <div id="triggerProgressBar" style="display:none;height:4px;border-radius:2px;background:var(--border);overflow:hidden">
            <div id="triggerProgressFill" style="height:100%;background:var(--accent);width:0%;transition:width 0.4s ease"></div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- 左侧 resize handle -->
  <div class="resize-handle" id="resizeLeft"></div>

  <!-- 中间论文列表 -->
  <div class="content-area">
    <div id="paperList" class="paper-list"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <p>暂无数据。请点击"触发"手动运行，或等待每日定时任务。</p>
    </div>
  </div>

  <!-- 右侧 resize handle -->
  <div class="resize-handle" id="resizeRight"></div>

  <!-- 右侧面板 -->
  <aside class="right-panel" id="rightPanel">
    <!-- 论文详情 -->
    <div class="detail-body" id="detailBody">
      <div style="color:var(--text3);text-align:center;padding:40px 0;font-size:13px">
        点击左侧论文卡片查看详情
      </div>
    </div>
  </aside>
</div>
{% endblock %}

{% block scripts %}
<script>
let TARGET_DATE = "{{ target_date }}";
let allPapers = [];
let jobInfo = null;
let currentView = 'selected';   // 'selected' | 'all' | 'bookmarks'
let bmSubFilter = 'all';        // 收藏视图内的子过滤：'all' | 'selected'
let currentArxivId = null;

// ── 初始化 ──────────────────────────────────────────────────────────────────
async function init() {
  initResizeHandles();
  restorePanelWidths();
  const urlParams = new URLSearchParams(window.location.search);
  const initView = urlParams.get('view');
  if (initView === 'bookmarks') {
    document.getElementById('navBookmarks').classList.add('active');
    // 取消"论文"链接的 active（由服务端渲染，需客户端覆盖）
    document.querySelector('.nav-links a[href="/papers"]')?.classList.remove('active');
    document.getElementById('dateSelect').value = 'all';
    currentView = 'bookmarks';
    bmSubFilter = 'all';
    document.getElementById('btnSelected').classList.remove('active');
    document.getElementById('btnAll').classList.add('active');
    await loadData('all');
  } else {
    await loadData(TARGET_DATE);
    try {
      const st = await (await fetch('/papers/trigger/status')).json();
      if (st.running) {
        _setTriggerRunning(true);
        _setProgress('<span class="pulse-dot"></span> 后台任务进行中...', null);
        _readTriggerProgress();
      }
    } catch(e) {}
  }
}

// ── 数据加载（统一入口） ─────────────────────────────────────────────────────
// d = 'all' 时加载全部收藏；否则加载指定日期的论文
async function loadData(d) {
  const prevArxivId = currentArxivId;
  if (!prevArxivId) document.getElementById('paperList').innerHTML = '<div class="loading">加载中...</div>';
  try {
    let papers, job = null;
    if (d === 'all') {
      const res = await fetch('/papers/bookmarks/full');
      papers = await res.json();
    } else {
      const res = await fetch(`/papers/api?date=${d}`);
      const data = await res.json();
      papers = data.papers || [];
      job = data.job;
    }
    allPapers = papers;
    jobInfo = job;
    renderJobStatus(jobInfo);
    buildFieldFilters();
    applyFilters();
    if (prevArxivId && allPapers.find(p => p.arxiv_id === prevArxivId)) {
      showDetail(prevArxivId);
    } else {
      const first = currentView === 'bookmarks'
        ? allPapers[0]
        : (allPapers.find(p => p.keep) || allPapers[0]);
      if (first) showDetail(first.arxiv_id);
    }
  } catch(e) {
    document.getElementById('paperList').innerHTML = '<div class="error">加载失败: ' + e.message + '</div>';
  }
}

// ── 视图切换（精选/全部） ────────────────────────────────────────────────────
// 收藏视图下：精选/全部只控制收藏内部子过滤，不改变 currentView，不重载数据
function setView(v) {
  if (currentView === 'bookmarks') {
    bmSubFilter = v;  // 'selected' 或 'all'，在收藏集内再过滤
  } else {
    currentView = v;
  }
  document.getElementById('btnSelected').classList.toggle('active', v === 'selected');
  document.getElementById('btnAll').classList.toggle('active', v === 'all');
  applyFilters();
}

// ── 筛选逻辑 ────────────────────────────────────────────────────────────────
function applyFilters() {
  const activeFields = new Set(
    [...document.querySelectorAll('.field-cb:checked')].map(cb => cb.value)
  );
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();

  let papers = allPapers;

  if (currentView === 'bookmarks') {
    papers = papers.filter(p => p.is_bookmarked);
    if (bmSubFilter === 'selected') {
      papers = papers.filter(p => p.keep);
      if (activeFields.size > 0) papers = papers.filter(p => !p.interest_field || activeFields.has(p.interest_field));
    }
  } else if (currentView === 'selected') {
    papers = papers.filter(p => p.keep);
    if (activeFields.size > 0) papers = papers.filter(p => !p.interest_field || activeFields.has(p.interest_field));
  }
  if (q) {
    papers = papers.filter(p =>
      (p.title || '').toLowerCase().includes(q) ||
      (p.tldr_zh || '').toLowerCase().includes(q) ||
      (p.tldr || '').toLowerCase().includes(q) ||
      (p.summary || '').toLowerCase().includes(q)
    );
  }

  renderPapers(papers);
  updateCounts();
}

// ── 渲染论文列表 ─────────────────────────────────────────────────────────────
function renderPapers(papers) {
  const list = document.getElementById('paperList');
  const empty = document.getElementById('emptyState');

  if (papers.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = papers.map(p => paperCard(p)).join('');
}

function paperCard(p) {
  const hp = p.high_priority ? `<span class="hp-badge">⭐ #${p.high_priority_rank}</span>` : '';
  const score = p.overall_priority_score != null ? p.overall_priority_score.toFixed(1) : '-';
  const tldr = p.tldr_zh || p.tldr || '';
  const authors = (p.authors || []).slice(0, 3).join(', ') + ((p.authors || []).length > 3 ? ' 等' : '');
  const field = p.interest_field ? `<span class="field-tag">${escHtml(p.interest_field)}</span>` : '';
  const dateChip = (currentView === 'bookmarks' && p.paper_date) ? `<span class="date-chip">${escHtml(p.paper_date)}</span>` : '';
  const tags = (p.tags || []).slice(0, 3).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
  const filteredCls = !p.keep ? ' card-filtered' : '';
  const activeCls = p.arxiv_id === currentArxivId ? ' active' : '';

  return `
  <div class="paper-card${filteredCls}${activeCls}" onclick="showDetail('${escHtml(p.arxiv_id)}')">
    <div class="card-header">
      ${hp}
      ${field}
      ${dateChip}
      <span class="card-score" title="综合评分">${score}</span>
    </div>
    <div class="card-title">${escHtml(p.title || '')}</div>
    <div class="card-meta">
      <span class="authors">${escHtml(authors)}</span>
    </div>
    ${tldr ? `<div class="card-tldr">${escHtml(tldr)}</div>` : ''}
    <div class="card-footer">
      <div class="card-tags">${tags}</div>
      <div class="card-links">
        <a href="https://alphaxiv.org/abs/${escHtml(p.arxiv_id || '')}" target="_blank" onclick="event.stopPropagation()">alphaXiv</a>
        ${p.pdf_url ? `<a href="${escHtml(p.pdf_url)}" target="_blank" onclick="event.stopPropagation()">PDF</a>` : ''}
        <button class="bookmark-btn${p.is_bookmarked ? ' bookmarked' : ''}" data-id="${escHtml(p.arxiv_id || '')}" onclick="event.stopPropagation();toggleBookmark(this,'${escHtml(p.arxiv_id || '')}')" title="${p.is_bookmarked ? '取消收藏' : '收藏'}">${p.is_bookmarked ? '★' : '☆'}</button>
      </div>
    </div>
  </div>`;
}


// ── 论文详情 ─────────────────────────────────────────────────────────────────
async function showDetail(arxivId) {
  currentArxivId = arxivId;
  // 高亮卡片
  document.querySelectorAll('.paper-card').forEach(el => el.classList.remove('active'));
  const cards = document.querySelectorAll('.paper-card');
  cards.forEach(el => { if (el.onclick.toString().includes(`'${arxivId}'`)) el.classList.add('active'); });

  const body = document.getElementById('detailBody');
  body.innerHTML = '<div class="loading">加载中...</div>';

  try {
    const res = await fetch(`/papers/${arxivId}`);
    const p = await res.json();
    body.innerHTML = renderDetail(p);
  } catch(e) {
    body.innerHTML = '<div class="error">加载失败</div>';
  }
}

function scoreBar(label, val) {
  if (val == null) return '';
  const pct = (val / 10 * 100).toFixed(0);
  return `<div class="detail-score-row">
    <span class="detail-score-label">${label}</span>
    <div class="detail-score-bar"><div class="detail-score-fill" style="width:${pct}%"></div></div>
    <span class="detail-score-val">${val.toFixed(1)}</span>
  </div>`;
}

function renderDetail(p) {
  const authors = (p.authors || []).join(', ');
  const score = p.overall_priority_score != null ? p.overall_priority_score : 0;
  const pct = (score / 10 * 100).toFixed(0);
  const hp = p.high_priority ? `<span class="hp-badge">⭐ 高优精选 #${p.high_priority_rank}</span>` : '';
  const field = p.interest_field ? `<span class="field-tag">${escHtml(p.interest_field)}</span>` : '';
  const subfield = p.interest_subfield ? `<span class="subfield-tag">${escHtml(p.interest_subfield)}</span>` : '';
  const signals = (p.signal_high_keywords || []).map(k => `<span class="sig-tag sig-high">${escHtml(k)}</span>`).join('') +
    (p.signal_notable_authors || []).map(a => `<span class="sig-tag sig-author">👤 ${escHtml(a)}</span>`).join('');

  return `
  <div class="detail-title">${escHtml(p.title || '')}</div>
  <div class="detail-meta">
    ${hp}
    <span>${escHtml(authors.slice(0, 80))}${authors.length > 80 ? '...' : ''}</span>
    <span>${p.published_date ? p.published_date.slice(0,10) : ''}</span>
    <a href="https://alphaxiv.org/abs/${escHtml(p.arxiv_id || '')}" target="_blank">alphaXiv ↗</a>
    ${p.pdf_url ? `<a href="${escHtml(p.pdf_url)}" target="_blank">PDF ↗</a>` : ''}
    <button class="bookmark-btn${p.is_bookmarked ? ' bookmarked' : ''}" data-id="${escHtml(p.arxiv_id || '')}" onclick="toggleBookmark(this,'${escHtml(p.arxiv_id || '')}')" title="${p.is_bookmarked ? '取消收藏' : '收藏'}">${p.is_bookmarked ? '★' : '☆'}</button>
  </div>
  ${field || subfield ? `<div style="display:flex;gap:4px;flex-wrap:wrap">${field}${subfield}</div>` : ''}
  ${p.tldr_zh ? `<div class="detail-tldr">${escHtml(p.tldr_zh)}</div>` : ''}
  <div>
    <div class="detail-section-label">评分</div>
    <div class="detail-score-row">
      <span class="detail-score-label">Overall</span>
      <div class="detail-score-bar"><div class="detail-score-fill" style="width:${pct}%"></div></div>
      <span class="detail-score-val">${score.toFixed ? score.toFixed(1) : score}</span>
    </div>
    ${scoreBar('Relevance', p.relevance_score)}
    ${scoreBar('Quality', p.quality_score)}
    ${scoreBar('Novelty', p.novelty_claim_score)}
    ${scoreBar('Impact', p.impact_score)}
  </div>
  ${p.summary_zh ? `<div><div class="detail-section-label">总结</div><div class="detail-summary">${escHtml(p.summary_zh)}</div></div>` : ''}
  ${signals ? `<div><div class="detail-section-label">标签</div><div>${signals}</div></div>` : ''}
  ${p.keep && p.keep_reason ? `<div><div class="detail-section-label">保留原因</div><div class="keep-reason-kept">${escHtml(p.keep_reason)}</div></div>` : ''}
  ${!p.keep && p.keep_reason ? `<div><div class="detail-section-label">过滤原因</div><div class="keep-reason">${escHtml(p.keep_reason)}</div></div>` : ''}
  <details>
    <summary>原始摘要</summary>
    <div class="detail-abstract">${escHtml(p.summary || '')}</div>
  </details>`;
}

// ── 构建 Field 筛选器 ────────────────────────────────────────────────────────
function buildFieldFilters() {
  const fields = {};
  const source = currentView === 'bookmarks'
    ? allPapers.filter(p => p.is_bookmarked && p.keep)
    : allPapers.filter(p => p.keep);
  for (const p of source) {
    if (p.interest_field) fields[p.interest_field] = (fields[p.interest_field] || 0) + 1;
  }
  const container = document.getElementById('fieldFilters');
  if (Object.keys(fields).length === 0) { container.innerHTML = '<span style="font-size:11px;color:var(--text3)">暂无</span>'; return; }
  container.innerHTML = Object.entries(fields)
    .sort((a,b) => b[1]-a[1])
    .map(([f, cnt]) => `
      <label class="field-filter-label">
        <input type="checkbox" class="field-cb" value="${escHtml(f)}" checked onchange="applyFilters()">
        ${escHtml(f)} <span class="count">${cnt}</span>
      </label>`).join('');
}

function updateCounts() {
  const total = allPapers.length;
  if (currentView === 'bookmarks') {
    const bm = allPapers.filter(p => p.is_bookmarked).length;
    document.getElementById('statsDisplay').innerHTML =
      `<div class="stat-item">收藏 <b>${bm}</b></div>`;
    return;
  }
  const kept = allPapers.filter(p => p.keep).length;
  const hp = allPapers.filter(p => p.high_priority).length;
  const bm = allPapers.filter(p => p.is_bookmarked).length;
  document.getElementById('statsDisplay').innerHTML =
    `<div class="stat-item">总计 <b>${total}</b></div>
     <div class="stat-item">精选 <b>${kept}</b></div>
     <div class="stat-item">高优 <b>${hp}</b></div>
     ${bm > 0 ? `<div class="stat-item">★ <b>${bm}</b></div>` : ''}`;
}

// ── 任务状态 ─────────────────────────────────────────────────────────────────
function renderJobStatus(job) {
  const section = document.getElementById('triggerSection');
  if (currentView === 'bookmarks') { if (section) section.style.display = 'none'; return; }
  if (section) section.style.display = '';
  const el = document.getElementById('jobStatus');
  if (!job) { el.innerHTML = '<span class="status-none">无记录</span>'; return; }
  const cls = {pending:'status-pending',scraping:'status-running',rating:'status-running',done:'status-done',failed:'status-failed'}[job.status] || '';
  const label = {pending:'等待中',scraping:'抓取中',rating:'评分中',done:'完成',failed:'失败'}[job.status] || job.status;
  el.innerHTML = `<span class="status-badge ${cls}">${label}</span>
    ${job.kept_count != null ? `<span class="status-detail">${job.kept_count}篇</span>` : ''}
    ${job.error_msg ? `<span class="status-error" title="${escHtml(job.error_msg)}">⚠</span>` : ''}`;
}

function _setTriggerRunning(running) {
  const btn = document.getElementById('triggerBtn');
  btn.disabled = running;
  btn.textContent = running ? '运行中...' : '触发';
}

function _setProgress(label, pct) {
  const prog = document.getElementById('triggerProgress');
  prog.style.display = 'block';
  document.getElementById('triggerProgressLabel').innerHTML = label;
  const bar = document.getElementById('triggerProgressBar');
  const fill = document.getElementById('triggerProgressFill');
  if (pct != null) {
    bar.style.display = 'block';
    fill.style.width = Math.min(100, Math.max(0, pct)) + '%';
  } else {
    bar.style.display = 'none';
  }
}

async function _readTriggerProgress() {
  _setProgress('<span class="pulse-dot"></span> 正在启动...', null);
  let datesProcessed = 0;
  try {
    const res = await fetch('/papers/trigger/progress');
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type === 'scraping') {
            const pct = (evt.step - 1) / 5 * 100;
            _setProgress(`<span class="pulse-dot"></span> 抓取 ${evt.date} (${evt.step}/5)`, pct);
          } else if (evt.type === 'rating') {
            const total = evt.count || 0;
            const rated = evt.rated || 0;
            const pct = total > 0 ? rated / total * 100 : 0;
            _setProgress(`<span class="pulse-dot"></span> 评分 ${evt.date}：${rated} / ${total} 篇`, pct);
            await _refreshDateSelect();
            if (evt.date === TARGET_DATE && rated > 0) {
              await loadPapers(TARGET_DATE);
            }
          } else if (evt.type === 'done_date') {
            datesProcessed++;
            _setProgress(`<span class="pulse-dot"></span> 完成 ${evt.date}，已处理 ${datesProcessed} 天`, 100);
            await _refreshDateSelect();
            await loadPapers(TARGET_DATE);
                    } else if (evt.type === 'skip') {
            _setProgress(`<span class="pulse-dot"></span> 跳过 ${evt.date}（无数据）`, null);
          } else if (evt.type === 'all_done') {
            _setProgress(`✓ 全部完成，共处理 ${evt.processed} 天`, 100);
            _setTriggerRunning(false);
            setTimeout(() => { document.getElementById('triggerProgress').style.display = 'none'; }, 2000);
            return;
          } else if (evt.type === 'error') {
            _setProgress(`<span style="color:var(--red)">错误: ${escHtml(evt.message)}</span>`, null);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    _setProgress(`<span style="color:var(--red)">进度读取失败: ${escHtml(e.message)}</span>`, null);
  } finally {
    _setTriggerRunning(false);
  }
}

async function _refreshDateSelect() {
  try {
    const dates = await (await fetch('/papers/dates')).json();
    const sel = document.getElementById('dateSelect');
    if (!sel) return;
    const cur = sel.value;
    sel.innerHTML = '<option value="all">全部日期</option>' +
      dates.map(d => `<option value="${d}"${d === TARGET_DATE ? ' selected' : ''}>${d}</option>`).join('');
    if (cur === 'all') sel.value = 'all';
  } catch(e) {}
}

async function triggerJob() {
  if (!confirm('触发论文抓取与评分（将处理最近 5 天数据）？')) return;
  _setTriggerRunning(true);
  _setProgress('<span class="pulse-dot"></span> 正在启动...', null);
  try {
    await fetch('/papers/trigger', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({force: false})
    });
    await _readTriggerProgress();
  } catch(e) {
    document.getElementById('triggerProgress').innerHTML =
      `<span style="color:var(--red)">触发失败: ${escHtml(e.message)}</span>`;
    _setTriggerRunning(false);
  }
}

// ── 日期切换 ─────────────────────────────────────────────────────────────────
async function changeDate(d) {
  if (d === 'all') {
    history.pushState({}, '', '/papers?view=bookmarks');
    currentView = 'bookmarks';
    bmSubFilter = 'all';
    document.getElementById('btnSelected').classList.remove('active');
    document.getElementById('btnAll').classList.add('active');
    document.getElementById('navBookmarks').classList.add('active');
    await loadData('all');
    return;
  }
  TARGET_DATE = d;
  history.pushState({date: d}, '', `/papers?date=${d}`);
  if (currentView === 'bookmarks') {
    currentView = 'selected';
    document.getElementById('btnSelected').classList.add('active');
    document.getElementById('btnAll').classList.remove('active');
    document.getElementById('navBookmarks').classList.remove('active');
  }
  await loadData(d);
}

// ── 三栏拖动 resize ──────────────────────────────────────────────────────────
function initResizeHandles() {
  const layout = document.getElementById('pageLayout');

  setupResize('resizeLeft', (dx) => {
    const cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--lw')) || 220;
    const nw = Math.max(0, Math.min(400, cur + dx));
    document.documentElement.style.setProperty('--lw', nw + 'px');
    if (nw < 20) {
      document.documentElement.style.setProperty('--lw', '0px');
    }
    localStorage.setItem('dp_lw', nw);
  });

  setupResize('resizeRight', (dx) => {
    const cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--rw')) || 360;
    const nw = Math.max(0, Math.min(600, cur - dx));
    document.documentElement.style.setProperty('--rw', nw + 'px');
    if (nw < 20) {
      document.documentElement.style.setProperty('--rw', '0px');
    }
    localStorage.setItem('dp_rw', nw);
  });
}

function setupResize(handleId, onDrag) {
  const handle = document.getElementById(handleId);
  let startX = 0;
  handle.addEventListener('mousedown', e => {
    startX = e.clientX;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const onMove = (e) => { onDrag(e.clientX - startX); startX = e.clientX; };
    const onUp = () => {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function restorePanelWidths() {
  const lw = localStorage.getItem('dp_lw');
  const rw = localStorage.getItem('dp_rw');
  if (lw !== null) document.documentElement.style.setProperty('--lw', lw + 'px');
  if (rw !== null) document.documentElement.style.setProperty('--rw', rw + 'px');
}

// ── 收藏 ─────────────────────────────────────────────────────────────────────
async function toggleBookmark(btn, arxivId) {
  const isBookmarked = btn.classList.contains('bookmarked');
  const method = isBookmarked ? 'DELETE' : 'POST';
  try {
    const res = await fetch(`/papers/${arxivId}/bookmark`, { method });
    if (!res.ok) return;
    const data = await res.json();
    const nowBookmarked = data.is_bookmarked;
    // Update all bookmark buttons for this paper (card + detail)
    document.querySelectorAll(`.bookmark-btn[data-id="${arxivId}"]`).forEach(b => {
      b.classList.toggle('bookmarked', nowBookmarked);
      b.textContent = nowBookmarked ? '★' : '☆';
      b.title = nowBookmarked ? '取消收藏' : '收藏';
    });
    // Sync in-memory list
    const p = allPapers.find(x => x.arxiv_id === arxivId);
    if (p) p.is_bookmarked = nowBookmarked;
    // In bookmarks view: re-filter so removed bookmark disappears from list
    if (currentView === 'bookmarks' && !nowBookmarked) {
      const remaining = allPapers.filter(x => x.is_bookmarked);
      applyFilters();
      if (currentArxivId === arxivId) {
        currentArxivId = null;
        if (remaining.length > 0) showDetail(remaining[0].arxiv_id);
        else document.getElementById('detailBody').innerHTML =
          '<div style="color:var(--text3);text-align:center;padding:40px 0;font-size:13px">收藏夹为空</div>';
      }
    } else {
      updateCounts();
    }
  } catch(e) { console.error('bookmark failed', e); }
}

// ── 工具函数 ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mdToHtml(md) {
  if (!md) return '';
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hul])(.+)$/gm, '<p>$1</p>');
}

init();
</script>
