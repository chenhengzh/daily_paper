{% extends "base.html" %}
{% block title %}Daily Paper{% endblock %}

{% block content %}
<div class="page-layout" id="pageLayout">

  <!-- 左侧面板 -->
  <aside class="filter-panel" id="leftPanel">
    <div class="filter-panel-inner" id="leftPanelInner">

      <div class="filter-section">
        <h3>日期</h3>
        <select id="dateSelect" onchange="changeDate(this.value)">
          {% for d in dates %}
          <option value="{{ d }}" {% if d == target_date %}selected{% endif %}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="filter-section">
        <h3>搜索</h3>
        <input type="text" id="searchInput" placeholder="标题、摘要、TLDR..." oninput="applyFilters()" style="width:100%">
      </div>

      <div class="filter-section">
        <h3>显示</h3>
        <div class="view-toggle">
          <button id="btnSelected" class="active" onclick="setView('selected')">精选</button>
          <button id="btnAll" onclick="setView('all')">全部</button>
        </div>
      </div>

      <div class="filter-section">
        <h3>研究方向</h3>
        <div id="fieldFilters" class="field-filters"></div>
      </div>

      <div class="filter-section stats-section">
        <div id="statsDisplay"></div>
      </div>

      <div class="filter-section">
        <div style="display:flex;gap:6px;align-items:center">
          <div id="jobStatus" class="job-status" style="flex:1"></div>
          <button class="btn btn-secondary btn-sm" id="triggerBtn" onclick="triggerJob()">触发</button>
        </div>
        <div id="triggerProgress" style="display:none;margin-top:8px;font-size:11px;color:var(--text3)"></div>
      </div>
    </div>
  </aside>

  <!-- 左侧 resize handle -->
  <div class="resize-handle" id="resizeLeft"></div>

  <!-- 中间论文列表 -->
  <div class="content-area">
    <div id="paperList" class="paper-list"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <p>暂无数据。请点击"触发"手动运行，或等待每日定时任务。</p>
    </div>
  </div>

  <!-- 右侧 resize handle -->
  <div class="resize-handle" id="resizeRight"></div>

  <!-- 右侧面板 -->
  <aside class="right-panel" id="rightPanel">
    <div class="right-tabs">
      <button class="right-tab active" id="tabSummary" onclick="switchTab('summary')">当日总结</button>
      <button class="right-tab" id="tabDetail" onclick="switchTab('detail')">论文详情</button>
    </div>

    <!-- 当日总结 -->
    <div class="right-tab-content active" id="contentSummary">
      <div class="summary-body" id="dailySummary">加载中...</div>
    </div>

    <!-- 论文详情 + 聊天 -->
    <div class="right-tab-content" id="contentDetail">
      <div class="detail-body" id="detailBody">
        <div style="color:var(--text3);text-align:center;padding:40px 0;font-size:13px">
          点击左侧论文卡片查看详情
        </div>
      </div>
      <div class="chat-wrap" id="chatWrap">
        <div class="chat-header">
          <span>与 AI 讨论</span>
          <button class="chat-clear-btn" onclick="clearChat()">清空</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" placeholder="输入问题，Enter 发送，Shift+Enter 换行..." rows="1"></textarea>
          <button class="chat-send-btn" id="chatSendBtn" onclick="sendChat()">发送</button>
        </div>
      </div>
    </div>
  </aside>
</div>
{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
{% endblock %}

{% block scripts %}
<script>
const TARGET_DATE = "{{ target_date }}";
let allPapers = [];
let jobInfo = null;
let currentView = 'selected';
let currentArxivId = null;
let chatHistory = [];

// ── 初始化 ──────────────────────────────────────────────────────────────────
async function init() {
  initResizeHandles();
  restorePanelWidths();
  await loadPapers(TARGET_DATE);
  await loadSummary(TARGET_DATE);
}

// ── 数据加载 ────────────────────────────────────────────────────────────────
async function loadPapers(d) {
  document.getElementById('paperList').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const res = await fetch(`/papers/api?date=${d}`);
    const data = await res.json();
    allPapers = data.papers || [];
    jobInfo = data.job;
    renderJobStatus(jobInfo);
    buildFieldFilters();
    applyFilters();
  } catch(e) {
    document.getElementById('paperList').innerHTML = '<div class="error">加载失败: ' + e.message + '</div>';
  }
}

async function loadSummary(d) {
  try {
    const res = await fetch(`/papers/summary?date=${d}`);
    const data = await res.json();
    document.getElementById('dailySummary').innerHTML = mdToHtml(data.daily_summary_zh || '（暂无当日总结）');
  } catch(e) {}
}

// ── 视图切换（精选/全部） ────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('btnSelected').classList.toggle('active', v === 'selected');
  document.getElementById('btnAll').classList.toggle('active', v === 'all');
  applyFilters();
}

// ── 筛选逻辑 ────────────────────────────────────────────────────────────────
function applyFilters() {
  const activeFields = new Set(
    [...document.querySelectorAll('.field-cb:checked')].map(cb => cb.value)
  );
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();

  let papers = allPapers;

  if (currentView === 'selected') papers = papers.filter(p => p.keep);
  if (activeFields.size > 0) papers = papers.filter(p => !p.interest_field || activeFields.has(p.interest_field));
  if (q) {
    papers = papers.filter(p =>
      (p.title || '').toLowerCase().includes(q) ||
      (p.tldr_zh || '').toLowerCase().includes(q) ||
      (p.tldr || '').toLowerCase().includes(q) ||
      (p.summary || '').toLowerCase().includes(q)
    );
  }

  renderPapers(papers);
  updateCounts();
}

// ── 渲染论文列表 ─────────────────────────────────────────────────────────────
function renderPapers(papers) {
  const list = document.getElementById('paperList');
  const empty = document.getElementById('emptyState');

  if (papers.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = papers.map(p => paperCard(p)).join('');
}

function paperCard(p) {
  const hp = p.high_priority ? `<span class="hp-badge">⭐ #${p.high_priority_rank}</span>` : '';
  const score = p.overall_priority_score != null ? p.overall_priority_score.toFixed(1) : '-';
  const tldr = p.tldr_zh || p.tldr || '';
  const authors = (p.authors || []).slice(0, 3).join(', ') + ((p.authors || []).length > 3 ? ' 等' : '');
  const field = p.interest_field ? `<span class="field-tag">${escHtml(p.interest_field)}</span>` : '';
  const tags = (p.tags || []).slice(0, 3).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
  const filteredCls = !p.keep ? ' card-filtered' : '';
  const activeCls = p.arxiv_id === currentArxivId ? ' active' : '';

  return `
  <div class="paper-card${filteredCls}${activeCls}" onclick="showDetail('${escHtml(p.arxiv_id)}')">
    <div class="card-header">
      ${hp}
      ${field}
      <span class="card-score" title="综合评分">${score}</span>
    </div>
    <div class="card-title">${escHtml(p.title || '')}</div>
    <div class="card-meta">
      <span class="authors">${escHtml(authors)}</span>
    </div>
    ${tldr ? `<div class="card-tldr">${escHtml(tldr.slice(0, 180))}${tldr.length > 180 ? '...' : ''}</div>` : ''}
    <div class="card-footer">
      <div class="card-tags">${tags}</div>
      <div class="card-links">
        <a href="${escHtml(p.url || '')}" target="_blank" onclick="event.stopPropagation()">arXiv</a>
        ${p.pdf_url ? `<a href="${escHtml(p.pdf_url)}" target="_blank" onclick="event.stopPropagation()">PDF</a>` : ''}
      </div>
    </div>
  </div>`;
}

// ── 右侧面板 Tab 切换 ────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabSummary').classList.toggle('active', tab === 'summary');
  document.getElementById('tabDetail').classList.toggle('active', tab === 'detail');
  document.getElementById('contentSummary').classList.toggle('active', tab === 'summary');
  document.getElementById('contentDetail').classList.toggle('active', tab === 'detail');
}

// ── 论文详情 ─────────────────────────────────────────────────────────────────
async function showDetail(arxivId) {
  const isNew = currentArxivId !== arxivId;
  if (isNew) {
    currentArxivId = arxivId;
    chatHistory = [];
    document.getElementById('chatMessages').innerHTML = '';
  }
  // 高亮卡片
  document.querySelectorAll('.paper-card').forEach(el => el.classList.remove('active'));
  const cards = document.querySelectorAll('.paper-card');
  cards.forEach(el => { if (el.onclick.toString().includes(`'${arxivId}'`)) el.classList.add('active'); });

  switchTab('detail');
  const body = document.getElementById('detailBody');
  body.innerHTML = '<div class="loading">加载中...</div>';

  try {
    const res = await fetch(`/papers/${arxivId}`);
    const p = await res.json();
    body.innerHTML = renderDetail(p);
  } catch(e) {
    body.innerHTML = '<div class="error">加载失败</div>';
  }
  if (isNew) await loadChatHistory(arxivId);
}

function scoreBar(label, val) {
  if (val == null) return '';
  const pct = (val / 10 * 100).toFixed(0);
  return `<div class="detail-score-row">
    <span class="detail-score-label">${label}</span>
    <div class="detail-score-bar"><div class="detail-score-fill" style="width:${pct}%"></div></div>
    <span class="detail-score-val">${val.toFixed(1)}</span>
  </div>`;
}

function renderDetail(p) {
  const authors = (p.authors || []).join(', ');
  const score = p.overall_priority_score != null ? p.overall_priority_score : 0;
  const pct = (score / 10 * 100).toFixed(0);
  const hp = p.high_priority ? `<span class="hp-badge">⭐ 高优精选 #${p.high_priority_rank}</span>` : '';
  const field = p.interest_field ? `<span class="field-tag">${escHtml(p.interest_field)}</span>` : '';
  const subfield = p.interest_subfield ? `<span class="subfield-tag">${escHtml(p.interest_subfield)}</span>` : '';
  const signals = (p.signal_high_keywords || []).map(k => `<span class="sig-tag sig-high">${escHtml(k)}</span>`).join('') +
    (p.signal_notable_authors || []).map(a => `<span class="sig-tag sig-author">👤 ${escHtml(a)}</span>`).join('');

  return `
  <div class="detail-title">${escHtml(p.title || '')}</div>
  <div class="detail-meta">
    ${hp}
    <span>${escHtml(authors.slice(0, 80))}${authors.length > 80 ? '...' : ''}</span>
    <span>${p.published_date ? p.published_date.slice(0,10) : ''}</span>
    <a href="${escHtml(p.url || '')}" target="_blank">arXiv ↗</a>
    ${p.pdf_url ? `<a href="${escHtml(p.pdf_url)}" target="_blank">PDF ↗</a>` : ''}
  </div>
  ${field || subfield ? `<div style="display:flex;gap:4px;flex-wrap:wrap">${field}${subfield}</div>` : ''}
  ${p.tldr_zh ? `<div class="detail-tldr">${escHtml(p.tldr_zh)}</div>` : ''}
  <div>
    <div class="detail-section-label">评分</div>
    <div class="detail-score-row">
      <span class="detail-score-label">综合</span>
      <div class="detail-score-bar"><div class="detail-score-fill" style="width:${pct}%"></div></div>
      <span class="detail-score-val">${score.toFixed ? score.toFixed(1) : score}</span>
    </div>
    ${scoreBar('相关性', p.relevance_score)}
    ${scoreBar('质量', p.quality_score)}
    ${scoreBar('新颖性', p.novelty_claim_score)}
    ${scoreBar('清晰度', p.clarity_score)}
    ${scoreBar('影响力', p.potential_impact_score)}
  </div>
  ${signals ? `<div><div class="detail-section-label">信号</div><div>${signals}</div></div>` : ''}
  ${!p.keep && p.keep_reason ? `<div><div class="detail-section-label">过滤原因</div><div class="keep-reason">${escHtml(p.keep_reason)}</div></div>` : ''}
  <details>
    <summary>原始摘要</summary>
    <div class="detail-abstract">${escHtml(p.summary || '')}</div>
  </details>`;
}

// ── 聊天 ─────────────────────────────────────────────────────────────────────
async function loadChatHistory(arxivId) {
  try {
    const res = await fetch(`/papers/${arxivId}/chat/history`);
    const msgs = await res.json();
    chatHistory = msgs.map(m => ({ role: m.role, content: m.content }));
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    for (const m of msgs) {
      appendBubble(m.role === 'user' ? 'user' : 'ai', m.content);
    }
  } catch(e) {}
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !currentArxivId) return;

  input.value = '';
  input.style.height = '36px';

  chatHistory.push({ role: 'user', content: text });
  appendBubble('user', text);

  const sendBtn = document.getElementById('chatSendBtn');
  sendBtn.disabled = true;
  const loadingId = 'bubble-loading-' + Date.now();
  appendBubble('ai', '思考中...', loadingId, true);

  let collected = '';
  try {
    const res = await fetch(`/papers/${currentArxivId}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text }),
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    const el = document.getElementById(loadingId);
    if (el) el.classList.remove('loading');
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') break;
        try {
          const chunk = JSON.parse(payload);
          if (chunk.startsWith && chunk.startsWith('[ERROR]')) {
            if (el) el.textContent = chunk;
            return;
          }
          collected += chunk;
          if (el) el.innerHTML = renderMarkdown(collected);
        } catch(e) {}
      }
    }
    chatHistory.push({ role: 'assistant', content: collected });
    const msgs = document.getElementById('chatMessages');
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    const el = document.getElementById(loadingId);
    if (el) { el.textContent = '请求失败: ' + e.message; el.classList.remove('loading'); }
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

function appendBubble(role, text, id, isLoading) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + role + (isLoading ? ' loading' : '');
  if (id) div.id = id;
  if (isLoading || role === 'user') {
    div.textContent = text;
  } else {
    div.innerHTML = renderMarkdown(text);
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function renderMarkdown(text) {
  // 先用 marked 解析 Markdown
  let html = marked.parse(text, { breaks: true, gfm: true });
  // 再用 KaTeX 渲染 LaTeX（$...$ 和 $$...$$）
  html = html.replace(/\$\$([^$]+?)\$\$/gs, (_, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false }); }
    catch(e) { return `<code>$$${tex}$$</code>`; }
  });
  html = html.replace(/\$([^$\n]+?)\$/g, (_, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false }); }
    catch(e) { return `<code>$${tex}$</code>`; }
  });
  return html;
}

function clearChat() {
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
}

// Enter 发送，Shift+Enter 换行
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('chatInput');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
  input.addEventListener('input', () => {
    input.style.height = '36px';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });
});

// ── 构建 Field 筛选器 ────────────────────────────────────────────────────────
function buildFieldFilters() {
  const fields = {};
  for (const p of allPapers) {
    if (p.keep && p.interest_field) fields[p.interest_field] = (fields[p.interest_field] || 0) + 1;
  }
  const container = document.getElementById('fieldFilters');
  if (Object.keys(fields).length === 0) { container.innerHTML = '<span style="font-size:11px;color:var(--text3)">暂无</span>'; return; }
  container.innerHTML = Object.entries(fields)
    .sort((a,b) => b[1]-a[1])
    .map(([f, cnt]) => `
      <label class="field-filter-label">
        <input type="checkbox" class="field-cb" value="${escHtml(f)}" checked onchange="applyFilters()">
        ${escHtml(f)} <span class="count">${cnt}</span>
      </label>`).join('');
}

function updateCounts() {
  const total = allPapers.length;
  const kept = allPapers.filter(p => p.keep).length;
  const hp = allPapers.filter(p => p.high_priority).length;
  document.getElementById('statsDisplay').innerHTML =
    `<div class="stat-item">总计 <b>${total}</b></div>
     <div class="stat-item">精选 <b>${kept}</b></div>
     <div class="stat-item">高优 <b>${hp}</b></div>`;
}

// ── 任务状态 ─────────────────────────────────────────────────────────────────
function renderJobStatus(job) {
  const el = document.getElementById('jobStatus');
  if (!job) { el.innerHTML = '<span class="status-none">无记录</span>'; return; }
  const cls = {pending:'status-pending',scraping:'status-running',rating:'status-running',done:'status-done',failed:'status-failed'}[job.status] || '';
  const label = {pending:'等待中',scraping:'抓取中',rating:'评分中',done:'完成',failed:'失败'}[job.status] || job.status;
  el.innerHTML = `<span class="status-badge ${cls}">${label}</span>
    ${job.kept_count != null ? `<span class="status-detail">${job.kept_count}篇</span>` : ''}
    ${job.error_msg ? `<span class="status-error" title="${escHtml(job.error_msg)}">⚠</span>` : ''}`;
}

function _setTriggerRunning(running) {
  const btn = document.getElementById('triggerBtn');
  btn.disabled = running;
  btn.textContent = running ? '运行中...' : '触发';
}

async function _readTriggerProgress() {
  const prog = document.getElementById('triggerProgress');
  prog.style.display = 'block';
  let datesProcessed = 0;
  try {
    const res = await fetch('/papers/trigger/progress');
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type === 'scraping') {
            prog.innerHTML = `<span class="pulse-dot"></span> 抓取 ${evt.date} (${evt.step}/5)`;
          } else if (evt.type === 'rating') {
            prog.innerHTML = `<span class="pulse-dot"></span> 评分 ${evt.date} (${evt.count} 篇)`;
          } else if (evt.type === 'done_date') {
            datesProcessed++;
            prog.innerHTML = `<span class="pulse-dot"></span> 完成 ${evt.date}，已处理 ${datesProcessed} 天`;
          } else if (evt.type === 'skip') {
            prog.innerHTML = `<span class="pulse-dot"></span> 跳过 ${evt.date}（无数据）`;
          } else if (evt.type === 'all_done') {
            prog.innerHTML = `✓ 全部完成，共处理 ${evt.processed} 天`;
            _setTriggerRunning(false);
            setTimeout(() => { prog.style.display = 'none'; window.location.reload(); }, 1500);
            return;
          } else if (evt.type === 'error') {
            prog.innerHTML = `<span style="color:var(--red)">错误: ${escHtml(evt.message)}</span>`;
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    prog.innerHTML = `<span style="color:var(--red)">进度读取失败: ${escHtml(e.message)}</span>`;
  } finally {
    _setTriggerRunning(false);
  }
}

async function triggerJob() {
  if (!confirm('触发论文抓取与评分（将处理最近 5 天数据）？')) return;
  _setTriggerRunning(true);
  document.getElementById('triggerProgress').textContent = '正在启动...';
  try {
    await fetch('/papers/trigger', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({force: false})
    });
    await _readTriggerProgress();
  } catch(e) {
    document.getElementById('triggerProgress').innerHTML =
      `<span style="color:var(--red)">触发失败: ${escHtml(e.message)}</span>`;
    _setTriggerRunning(false);
  }
}

// ── 日期切换 ─────────────────────────────────────────────────────────────────
function changeDate(d) {
  window.location.href = `/papers?date=${d}`;
}

// ── 三栏拖动 resize ──────────────────────────────────────────────────────────
function initResizeHandles() {
  const layout = document.getElementById('pageLayout');

  setupResize('resizeLeft', (dx) => {
    const cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--lw')) || 220;
    const nw = Math.max(0, Math.min(400, cur + dx));
    document.documentElement.style.setProperty('--lw', nw + 'px');
    if (nw < 20) {
      document.documentElement.style.setProperty('--lw', '0px');
    }
    localStorage.setItem('dp_lw', nw);
  });

  setupResize('resizeRight', (dx) => {
    const cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--rw')) || 360;
    const nw = Math.max(0, Math.min(600, cur - dx));
    document.documentElement.style.setProperty('--rw', nw + 'px');
    if (nw < 20) {
      document.documentElement.style.setProperty('--rw', '0px');
    }
    localStorage.setItem('dp_rw', nw);
  });
}

function setupResize(handleId, onDrag) {
  const handle = document.getElementById(handleId);
  let startX = 0;
  handle.addEventListener('mousedown', e => {
    startX = e.clientX;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const onMove = (e) => { onDrag(e.clientX - startX); startX = e.clientX; };
    const onUp = () => {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function restorePanelWidths() {
  const lw = localStorage.getItem('dp_lw');
  const rw = localStorage.getItem('dp_rw');
  if (lw !== null) document.documentElement.style.setProperty('--lw', lw + 'px');
  if (rw !== null) document.documentElement.style.setProperty('--rw', rw + 'px');
}

// ── 工具函数 ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mdToHtml(md) {
  if (!md) return '';
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hul])(.+)$/gm, '<p>$1</p>');
}

init();
</script>
