{% extends "base.html" %}
{% block title %}配置 - Daily Paper{% endblock %}

{% block content %}
<div class="config-page">
  <div class="config-header">
    <h2>个人配置</h2>
    <div class="config-actions">
      <span id="autoSaveStatus" style="font-size:12px;color:var(--text3)"></span>
      <button class="btn btn-secondary" onclick="resetToDefaults()">重置默认</button>
    </div>
  </div>

  <div id="saveMsg" class="alert" style="display:none"></div>

  <div class="config-sections">

    <!-- 研究兴趣（最重要） -->
    <section class="config-section">
      <h3>研究兴趣</h3>
      <p class="section-desc">每个条目代表一个研究方向，LLM 会据此对论文打分和分类。</p>
      <div id="interestItems" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">
        {% for item in config.interest_table %}
        <div class="interest-item" style="display:flex;gap:8px;align-items:center">
          <input type="text" class="ii-name" value="{{ item.name if item.name is defined else item.field }}" placeholder="方向名称" style="width:160px;flex-shrink:0">
          <input type="text" class="ii-desc" value="{{ item.description }}" placeholder="描述这个研究方向的关注点...">
          <button type="button" class="btn-icon btn-del" onclick="delInterestItem(this)">✕</button>
        </div>
        {% endfor %}
      </div>
      <button type="button" class="btn btn-secondary btn-sm" onclick="addInterestItem()">+ 添加方向</button>
    </section>

    <!-- 定时触发 -->
    <section class="config-section">
      <h3>定时触发</h3>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="auto_trigger" style="width:auto;accent-color:var(--accent)"
            {% if config.auto_trigger %}checked{% endif %}>
          开启定时触发
        </label>
        <div style="display:flex;align-items:center;gap:6px;font-size:13px">
          <label>触发时间</label>
          <input type="number" id="trigger_hour" value="{{ config.trigger_hour }}" min="0" max="23" style="width:56px;text-align:center">
          <span>:</span>
          <input type="number" id="trigger_minute" value="{{ config.trigger_minute }}" min="0" max="59" style="width:56px;text-align:center">
          <span style="color:var(--text3)">（24小时制，工作日每天）</span>
        </div>
      </div>
    </section>

    <!-- arXiv 搜索 -->
    <section class="config-section">
      <h3>arXiv 搜索配置</h3>
      <div class="form-grid" style="grid-template-columns:1fr 1fr auto auto">
        <div class="form-group">
          <label>搜索关键词（每行一个）</label>
          <textarea id="keywords" rows="5">{{ config.keywords | join('\n') }}</textarea>
        </div>
        <div class="form-group">
          <label>arXiv 分类（每行一个）</label>
          <textarea id="categories" rows="5">{{ config.categories | join('\n') }}</textarea>
        </div>
      </div>
    </section>

    <!-- 高级设置（折叠） -->
    <details class="advanced-section">
      <summary>高级设置</summary>
      <div class="advanced-inner">

        <section style="margin-bottom:20px">
          <h3 style="font-size:13px;margin-bottom:10px">信号关键词与作者</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>高信号关键词（每行一个，命中加分）</label>
              <textarea id="high_signal_keywords" rows="8">{{ config.high_signal_keywords | join('\n') }}</textarea>
            </div>
            <div class="form-group">
              <label>降权关键词（每行一个，命中降分）</label>
              <textarea id="deemphasized_keywords" rows="8">{{ config.deemphasized_keywords | join('\n') }}</textarea>
            </div>
            <div class="form-group">
              <label>重点关注作者（每行一个全名）</label>
              <textarea id="notable_authors" rows="8">{{ config.notable_authors | join('\n') }}</textarea>
            </div>
          </div>
        </section>

        <section>
          <div class="form-group" style="margin-bottom:12px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text)">
              <input type="checkbox" id="use_private_api" onchange="togglePrivateApi()"
                {% if config.llm_api_key %}checked{% endif %}
                style="width:auto;accent-color:var(--accent)">
              使用私人 LLM API
            </label>
          </div>
          <div id="privateApiFields" style="display:{% if config.llm_api_key %}block{% else %}none{% endif %}">
            <div class="form-grid">
              <div class="form-group">
                <label>API Key</label>
                <input type="password" id="llm_api_key" value="{{ config.llm_api_key }}" placeholder="sk-...">
              </div>
              <div class="form-group">
                <label>Endpoint</label>
                <input type="text" id="llm_endpoint" value="{{ config.llm_endpoint }}" placeholder="https://...">
              </div>
              <div class="form-group">
                <label>Model</label>
                <input type="text" id="llm_model" value="{{ config.llm_model }}" placeholder="deepseek-v3.2">
              </div>
            </div>
          </div>
          <div class="form-group" style="max-width:200px">
            <label>最大抓取数量</label>
            <input type="number" id="max_results" value="{{ config.max_results }}" min="100" max="2000">
          </div>
        </section>

      </div>
    </details>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let _saveTimer = null;

function _scheduleAutoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveConfig, 800);
}

function togglePrivateApi() {
  document.getElementById('privateApiFields').style.display =
    document.getElementById('use_private_api').checked ? 'block' : 'none';
  _scheduleAutoSave();
}

function getLines(id) {
  return document.getElementById(id).value.split('\n').map(s => s.trim()).filter(Boolean);
}

function getInterestItems() {
  const result = [];
  for (const item of document.querySelectorAll('#interestItems .interest-item')) {
    const name = item.querySelector('.ii-name').value.trim();
    const desc = item.querySelector('.ii-desc').value.trim();
    if (name) result.push({name, description: desc});
  }
  return result;
}

function addInterestItem(name='', desc='') {
  const container = document.getElementById('interestItems');
  const div = document.createElement('div');
  div.className = 'interest-item';
  div.style.cssText = 'display:flex;gap:8px;align-items:center';
  div.innerHTML = `
    <input type="text" class="ii-name" value="${esc(name)}" placeholder="方向名称" style="width:160px;flex-shrink:0" oninput="_scheduleAutoSave()">
    <input type="text" class="ii-desc" value="${esc(desc)}" placeholder="描述这个研究方向的关注点..." oninput="_scheduleAutoSave()">
    <button type="button" class="btn-icon btn-del" onclick="delInterestItem(this)">✕</button>`;
  container.appendChild(div);
  div.querySelector('.ii-name').focus();
}

function delInterestItem(btn) {
  btn.closest('.interest-item').remove();
  _scheduleAutoSave();
}

async function saveConfig() {
  const payload = {
    keywords: getLines('keywords'),
    categories: getLines('categories'),
    interest_table: getInterestItems(),
    high_signal_keywords: getLines('high_signal_keywords'),
    deemphasized_keywords: getLines('deemphasized_keywords'),
    notable_authors: getLines('notable_authors'),
    llm_api_key: document.getElementById('use_private_api').checked ? (document.getElementById('llm_api_key').value.trim() || null) : null,
    llm_endpoint: document.getElementById('use_private_api').checked ? (document.getElementById('llm_endpoint').value.trim() || null) : null,
    llm_model: document.getElementById('use_private_api').checked ? (document.getElementById('llm_model').value.trim() || null) : null,
    max_results: parseInt(document.getElementById('max_results').value) || 800,
    auto_trigger: document.getElementById('auto_trigger').checked,
    trigger_hour: parseInt(document.getElementById('trigger_hour').value) || 18,
    trigger_minute: parseInt(document.getElementById('trigger_minute').value) || 0,
  };
  const status = document.getElementById('autoSaveStatus');
  try {
    status.textContent = '保存中...';
    const res = await fetch('/config/api', {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      status.textContent = '已自动保存';
      setTimeout(() => { status.textContent = ''; }, 2000);
    } else {
      status.textContent = '保存失败';
      showMsg('保存失败：' + res.statusText, 'error');
    }
  } catch(e) {
    status.textContent = '保存失败';
    showMsg('保存失败：' + e.message, 'error');
  }
}

async function resetToDefaults() {
  if (!confirm('确定重置为系统默认配置？')) return;
  try {
    const res = await fetch('/config/defaults');
    const d = await res.json();
    document.getElementById('keywords').value = (d.keywords || []).join('\n');
    document.getElementById('categories').value = (d.categories || []).join('\n');
    document.getElementById('high_signal_keywords').value = (d.high_signal_keywords || []).join('\n');
    document.getElementById('deemphasized_keywords').value = (d.deemphasized_keywords || []).join('\n');
    document.getElementById('notable_authors').value = (d.notable_authors || []).join('\n');
    document.getElementById('max_results').value = d.max_results || 800;
    const container = document.getElementById('interestItems');
    container.innerHTML = '';
    for (const item of (d.interest_table || [])) {
      addInterestItem(item.name || item.field || '', item.description || '');
    }
    await saveConfig();
    showMsg('已重置为默认配置', 'success');
  } catch(e) { showMsg('重置失败：' + e.message, 'error'); }
}

function showMsg(msg, type) {
  const el = document.getElementById('saveMsg');
  el.textContent = msg; el.className = 'alert alert-' + type; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 绑定所有输入的自动保存
document.addEventListener('DOMContentLoaded', () => {
  const ids = ['keywords','categories','high_signal_keywords','deemphasized_keywords','notable_authors',
               'llm_api_key','llm_endpoint','llm_model','max_results',
               'auto_trigger','trigger_hour','trigger_minute'];
  for (const id of ids) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', _scheduleAutoSave);
    if (el && (el.type === 'checkbox' || el.type === 'number')) {
      el.addEventListener('change', _scheduleAutoSave);
    }
  }
});
</script>
{% endblock %}
