{% extends "base.html" %}
{% block title %}日志 - Daily Paper{% endblock %}

{% block content %}
<div class="config-page">
  <div class="config-header">
    <h2>使用日志</h2>
    <div style="display:flex;align-items:center;gap:10px">
      <label style="font-size:13px;color:var(--text3)">最近</label>
      <select id="daysSelect" onchange="loadAll()" style="width:90px;font-size:13px">
        <option value="7">7 天</option>
        <option value="30" selected>30 天</option>
        <option value="90">90 天</option>
        <option value="180">180 天</option>
      </select>
    </div>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" id="tabStats" onclick="switchTab('stats')">用户统计</button>
    <button class="admin-tab" id="tabJobs" onclick="switchTab('jobs')">任务明细</button>
    <button class="admin-tab" id="tabChart" onclick="switchTab('chart')">趋势图</button>
  </div>

  <!-- 用户统计 -->
  <div id="panelStats" class="admin-panel">
    <div id="statsLoading" style="color:var(--text3);font-size:13px;padding:12px 0">加载中...</div>
    <table class="admin-table" id="statsTable" style="display:none">
      <thead>
        <tr>
          <th>用户名</th>
          <th>类型</th>
          <th>任务数</th>
          <th>评分论文</th>
          <th>输入 Token</th>
          <th>输出 Token</th>
          <th>合计 Token</th>
          <th>最近任务</th>
        </tr>
      </thead>
      <tbody id="statsTbody"></tbody>
    </table>
  </div>

  <!-- 任务明细 -->
  <div id="panelJobs" class="admin-panel" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:12px;align-items:center">
      <select id="userFilter" onchange="loadJobs()" style="width:160px;font-size:13px">
        <option value="">全部用户</option>
      </select>
    </div>
    <div id="jobsLoading" style="color:var(--text3);font-size:13px;padding:12px 0">加载中...</div>
    <table class="admin-table" id="jobsTable" style="display:none">
      <thead>
        <tr>
          <th>日期</th>
          <th>用户</th>
          <th>状态</th>
          <th>抓取</th>
          <th>评分</th>
          <th>保留</th>
          <th>高优</th>
          <th>输入 Token</th>
          <th>输出 Token</th>
          <th>合计 Token</th>
          <th>耗时</th>
        </tr>
      </thead>
      <tbody id="jobsTbody"></tbody>
    </table>
  </div>

  <!-- 趋势图 -->
  <div id="panelChart" class="admin-panel" style="display:none">
    <canvas id="tokenChart" style="max-height:320px"></canvas>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
let _chart = null;
let _statsData = null;
let _jobsData = null;

function switchTab(name) {
  ['stats','jobs','chart'].forEach(t => {
    document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === name ? '' : 'none';
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === name);
  });
  if (name === 'chart' && _statsData) renderChart(_statsData.daily);
}

function days() { return parseInt(document.getElementById('daysSelect').value); }

function fmt(n) {
  if (n == null) return '—';
  if (n >= 1000000) return (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

function statusBadge(s) {
  const map = {done:'✓ 完成', failed:'✗ 失败', rating:'⟳ 评分中', scraping:'⟳ 抓取中', pending:'… 等待'};
  const cls = {done:'success', failed:'error', rating:'warn', scraping:'warn', pending:''};
  return `<span class="badge badge-${cls[s]||''}">${map[s]||s}</span>`;
}

async function loadStats() {
  document.getElementById('statsLoading').style.display = '';
  document.getElementById('statsTable').style.display = 'none';
  const res = await fetch(`/logs/api/stats?days=${days()}`);
  _statsData = await res.json();
  const tbody = document.getElementById('statsTbody');
  tbody.innerHTML = '';
  let totIn=0, totOut=0, totRated=0, totJobs=0;
  for (const u of _statsData.users) {
    totIn += u.total_input_tokens;
    totOut += u.total_output_tokens;
    totRated += u.total_rated;
    totJobs += u.job_count;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${esc(u.username)}</td>
      <td><span class="badge badge-${u.user_type==='internal'?'info':''}">${u.user_type==='internal'?'内部':'外部'}</span></td>
      <td>${u.job_count}</td>
      <td>${fmt(u.total_rated)}</td>
      <td>${fmt(u.total_input_tokens)}</td>
      <td>${fmt(u.total_output_tokens)}</td>
      <td><strong>${fmt(u.total_tokens)}</strong></td>
      <td>${u.last_job_date||'—'}</td>`;
    tbody.appendChild(tr);
  }
  // totals row
  const tf = document.createElement('tr');
  tf.style.cssText = 'font-weight:600;border-top:2px solid var(--border)';
  tf.innerHTML = `<td>合计</td><td></td><td>${totJobs}</td><td>${fmt(totRated)}</td><td>${fmt(totIn)}</td><td>${fmt(totOut)}</td><td>${fmt(totIn+totOut)}</td><td></td>`;
  tbody.appendChild(tf);
  document.getElementById('statsLoading').style.display = 'none';
  document.getElementById('statsTable').style.display = '';
}

async function loadJobs() {
  document.getElementById('jobsLoading').style.display = '';
  document.getElementById('jobsTable').style.display = 'none';
  const uid = document.getElementById('userFilter').value;
  const url = `/logs/api/jobs?days=${days()}${uid ? '&user_id='+uid : ''}`;
  const res = await fetch(url);
  _jobsData = await res.json();
  const tbody = document.getElementById('jobsTbody');
  tbody.innerHTML = '';
  for (const j of _jobsData.jobs) {
    let dur = '—';
    if (j.started_at && j.finished_at) {
      const s = (new Date(j.finished_at) - new Date(j.started_at)) / 1000;
      dur = s >= 60 ? (s/60).toFixed(1)+'min' : s.toFixed(0)+'s';
    }
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${j.job_date}</td>
      <td>${esc(j.username)}</td>
      <td>${statusBadge(j.status)}</td>
      <td>${j.scrape_count??'—'}</td>
      <td>${j.rated_count??'—'}</td>
      <td>${j.kept_count??'—'}</td>
      <td>${j.high_priority_count??'—'}</td>
      <td>${fmt(j.input_tokens)}</td>
      <td>${fmt(j.output_tokens)}</td>
      <td><strong>${fmt(j.total_tokens)}</strong></td>
      <td>${dur}</td>`;
    if (j.error_msg) {
      tr.title = j.error_msg;
      tr.style.color = 'var(--red)';
    }
    tbody.appendChild(tr);
  }
  document.getElementById('jobsLoading').style.display = 'none';
  document.getElementById('jobsTable').style.display = '';
}

function renderChart(daily) {
  const labels = daily.map(d => d.date);
  const inputData = daily.map(d => d.input_tokens);
  const outputData = daily.map(d => d.output_tokens);
  const ctx = document.getElementById('tokenChart').getContext('2d');
  if (_chart) _chart.destroy();
  const isDark = document.body.classList.contains('dark');
  const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
  const textColor = isDark ? '#aaa' : '#666';
  _chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {label:'输入 Token', data:inputData, backgroundColor:'rgba(99,102,241,0.7)', stack:'s'},
        {label:'输出 Token', data:outputData, backgroundColor:'rgba(16,185,129,0.7)', stack:'s'},
      ]
    },
    options: {
      responsive: true,
      plugins: {legend:{labels:{color:textColor}},tooltip:{mode:'index',intersect:false}},
      scales: {
        x:{stacked:true,ticks:{color:textColor},grid:{color:gridColor}},
        y:{stacked:true,ticks:{color:textColor,callback:v=>fmt(v)},grid:{color:gridColor}},
      }
    }
  });
}

async function loadAll() {
  await Promise.all([loadStats(), loadJobs()]);
  // populate user filter
  if (_statsData) {
    const sel = document.getElementById('userFilter');
    const cur = sel.value;
    sel.innerHTML = '<option value="">全部用户</option>';
    for (const u of _statsData.users) {
      const opt = document.createElement('option');
      opt.value = u.user_id; opt.textContent = u.username;
      if (String(u.user_id) === cur) opt.selected = true;
      sel.appendChild(opt);
    }
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('DOMContentLoaded', loadAll);
</script>
{% endblock %}
