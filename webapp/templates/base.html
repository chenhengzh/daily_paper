<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Daily Paper{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
  <script>
    // Apply saved theme before paint to avoid flash
    (function() {
      if (localStorage.getItem('dp_theme') === 'dark') {
        document.documentElement.classList.add('dark-pending');
      }
    })();
  </script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block nav %}
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/papers">Daily Paper</a>
    </div>
    <div class="nav-links">
      <a href="/papers" class="{% if request.url.path.startswith('/papers') %}active{% endif %}">论文</a>
      <a href="/papers?view=bookmarks" id="navBookmarks">收藏</a>
      <a href="/config" class="{% if request.url.path.startswith('/config') %}active{% endif %}">配置</a>
      {% if user.is_admin %}<a href="/admin/" class="{% if request.url.path.startswith('/admin') %}active{% endif %}">管理</a>{% endif %}
      {% if user.is_admin %}<a href="/logs/" class="{% if request.url.path.startswith('/logs') %}active{% endif %}">日志</a>{% endif %}
      <button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="切换主题" style="font-size:16px;padding:2px 6px">☀</button>
      <span class="nav-user">{{ user.username }}</span>
      <form action="/auth/logout" method="post" style="display:inline">
        <button type="submit" class="btn-link">登出</button>
      </form>
    </div>
  </nav>
  {% endblock %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <script>
    function _applyTheme(dark) {
      document.body.classList.toggle('dark', dark);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = dark ? '☾' : '☀';
    }
    function toggleTheme() {
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('dp_theme', isDark ? 'light' : 'dark');
      _applyTheme(!isDark);
    }
    // Apply theme on load
    _applyTheme(localStorage.getItem('dp_theme') === 'dark');
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
